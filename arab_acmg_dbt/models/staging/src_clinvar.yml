version: 2

sources:
  - name: clinvar_raw
    description: "Frozen ClinVar GRCh38 raw VCF table captured on 2026-03-03."
    project: genome-services-platform
    dataset: arab_acmg_raw
    tables:
      - name: clinvar_raw_vcf
        description: "Untouched ClinVar rows loaded into BigQuery with the standard raw VCF column layout."
        columns:
          - name: chrom
            description: "Source chromosome string from the raw VCF."
            data_tests:
              - not_null
          - name: pos
            description: "1-based genomic position from the raw VCF."
            data_tests:
              - not_null
              - positive_when_present
          - name: ref
            description: "Reference allele from the raw VCF row."
            data_tests:
              - not_null
          - name: alt
            description: "Comma-delimited alternate allele payload from the raw VCF row."
            data_tests:
              - not_null
          - name: info
            description: "ClinVar INFO payload preserved as a raw semicolon-delimited string."
            data_tests:
              - not_null
