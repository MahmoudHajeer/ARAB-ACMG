version: 2

sources:
  - name: arab_raw
    description: "Arab and Middle Eastern frequency sources currently frozen into the raw layer."
    project: genome-services-platform
    dataset: arab_acmg_raw
    tables:
      - name: gme_hg38_raw
        description: "Frozen GME hg38 frequency table loaded on 2026-03-08. Staging models are deferred to Phase 4."
        columns:
          - name: chrom
            data_tests:
              - not_null
          - name: start
            data_tests:
              - not_null
              - positive_when_present
          - name: ref
            data_tests:
              - not_null
          - name: alt
            data_tests:
              - not_null
          - name: gme_af
            data_tests:
              - value_between:
                  arguments:
                    min_value: 0
                    max_value: 1
