arab_acmg_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('DBT_BIGQUERY_PROJECT', 'genome-services-platform') }}"
      dataset: "{{ env_var('DBT_BIGQUERY_DATASET', 'arab_acmg_raw') }}"
      threads: 4
      timeout_seconds: 300
      location: "{{ env_var('DBT_BIGQUERY_LOCATION', 'US') }}"
      priority: interactive
